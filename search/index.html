<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Eater&family=Indie+Flower&family=Jersey+25&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="company">
            <h1>Norse Fishing</h1>
        </div>
        <div id="links">
            <div class="box">
                <a href="../index.html">Home</a>
            </div>
            <div class="box current">
                <a href="">Search</a>
            </div>
            <div class="box">
                <a href="../about/index.html">About Us</a>
            </div>
            <div class="box">
                <a href="../contact/index.html">Contact Us</a>
            </div>
            <div id="checkoutContainer">
                <div class="box" id="checkoutBox">
                    <a href="../checkout/index.html"><img src="../svg/cart-shopping-solid-full.svg" class="svgImg" alt="Checkout"> Cart</a>
                </div>
                <div class="dropdown hidden" id="checkout">
                </div>
            </div>
        </div>
    </header>
    <div id="content" class="contentContainer">
        <div id="filterContainer" class="filterTab filterClosed">
                <img src="../svg/bars-solid-full.svg" id="filter" alt="Filter tab">
                <div id="filters">
                    <div class="filterCheckItems">
                        <label class="filterItem checkClass">
                            Rods
                            <input type="checkbox">
                            <span class="checkmark"></span>
                        </label>
                        <label class="filterItem checkClass">
                            Baits
                            <input type="checkbox">
                            <span class="checkmark"></span>
                        </label>
                        <label class="filterItem checkClass">
                            Tools
                            <input type="checkbox">
                            <span class="checkmark"></span>
                        </label>
                        <label class="filterItem checkClass">
                            Hooks
                            <input type="checkbox">
                            <span class="checkmark"></span>
                        </label>
                        <label class="filterItem checkClass">
                            Reels
                            <input type="checkbox">
                            <span class="checkmark"></span>
                        </label>
                        <label class="filterItem checkClass">
                            Baits
                            <input type="checkbox">
                            <span class="checkmark"></span>
                        </label>
                    </div>
                    <div id="filterCost">
                        <label class="checkClass">
                            <input type="checkbox" id="costCheck">
                            <span class="checkmark"></span>
                            Cost
                        </label>
                        <div class="costInputs"> 
                            <label>   
                                Min  
                                <input class="costInput" id="costMin" type="number" min="0" max="5000" step="100" value="100">
                            </label>
                            <label>
                                <input class="costInput" id="costMax" type="number" min="0" max="5000" step="100" value="500">
                                Max
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        <div class="searchContent">
            <div class="searchBar">
                <input type="search" id="search" autocomplete="off" placeholder="Search for a product">
                <button id="searchBtn" class="buttonInput">
                    <img src="../svg/magnifying-glass-solid-full.svg" class="searchSvg" alt="Search">
                </button>
            </div>
            <div id="products">

            </div>
        </div>
    </div>
    <script src="../script.js"></script>
    <script src="search.js"></script>
    <script src="filter.js"></script>
</body>
</html>
