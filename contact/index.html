<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Eater&family=Indie+Flower&family=Jersey+25&family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="company">
            <h1>Norse Fishing</h1>
        </div>
        <div id="links">
            <div class="box">
                <a href="../index.html">Home</a>
            </div>
            <div class="box">
                <a href="../search/index.html">Search</a>
            </div>
            <div class="box">
                <a href="../rods/index.html">Rods</a>
            </div>
            <div class="box">
                <a href="../baits/index.html">Baits</a>
            </div>
            <div class="box">
                <a href="../essentials/index.html">Essentials</a>
            </div>
            <div class="box">
                <a href="../about/index.html">About Us</a>
            </div>
            <div class="box current">
                <a href="">Contact Us</a>
            </div>
            <div id="checkoutContainer">
                <div class="box" id="checkoutBox">
                    <a href="../checkout/index.html"><img src="../svg/cart-shopping-solid-full.svg" class="svgImg"> Cart</a>
                </div>
                <div class="dropdown hidden" id="checkout">
                    
                </div>
            </div>
        </div>
    </header>
    <div id="content">
        <form>
            <h2>Contact us</h2>
            <div class="forumdiv">
                <img src="../svg/user-regular-full.svg">
                <input type="text" required placeholder="First Name">
            </div>
            <div class="forumdiv">
                <img src="../svg/user-regular-full.svg">
                <input type="text" required placeholder="Last Name">
            </div>
            <div class="forumdiv">
                <img src="../svg/envelope-regular-full.svg">
                <input type="email" required placeholder="Email">
            </div>
            <div class="forumdiv">
                <img src="../svg/phone-solid-full.svg">
                <input type="tel" placeholder="Phone">
            </div>
            <div class="forumdiv">
                <img src="../svg/message-regular-full.svg">
                <input type="text" maxlength="500" placeholder="Message">
            </div>
            <button id="submitBtn" type="button">Submit</button>
        </form>
    </div>
    <script src="../script.js"></script>
    <script src="contact.js"></script>
</body>
</html>
